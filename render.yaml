services:
  # Main web server (API + UI)
  # Telegram Worker runs in-process (same IP = no AUTH_KEY_DUPLICATED)
  - type: web
    name: teledesk
    env: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
